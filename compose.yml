services:
  cortex-multimodal-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortex-multimodal-proxy
    # Default: bridge networking + published port. Works for most setups.
    # For advanced networking requirements, uncomment `network_mode: host`
    # below and remove the `ports:` mapping. The proxy then binds directly on
    # the host; firewalling is the operator's responsibility.
    # network_mode: host
    ports:
      - "${PORT:-7777}:7777"
    env_file:
      - .env
    volumes:
      - proxy-cache:/app/cache
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || '7777') + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  proxy-cache:
